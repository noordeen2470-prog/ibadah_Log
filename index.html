async function syncToCloud() {
  await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({
      data: cloudData,
      settings: settings
    })
  });
}

async function saveSettings(start, end) {
  settings.startDate = start;
  settings.endDate = end;

  try {
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": API_KEY
      },
      body: JSON.stringify({
        data: cloudData,
        settings: settings
      })
    });
  } catch (err) {
    console.error("Settings save failed", err);
  }
}

function loadCheck(dateKey, habitIndex) {
  const key = dateKey + "_" + habitIndex;
  return cloudData[key] === true;
}

/* ✅ PROGRESS FUNCTION */
function updateProgress() {
  const checkboxes = document.querySelectorAll("input[type='checkbox']");

  let total = 0;
  let checked = 0;

  checkboxes.forEach(cb => {
    if (!cb.disabled) {
      total++;
      if (cb.checked) checked++;
    }
  });

  const percent = total ? Math.round((checked / total) * 100) : 0;

  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText = percent + "% Completed";
}

function generateTable() {  

  const table = document.getElementById("trackerTable");
  table.innerHTML = "";

  const startInput = document.getElementById("startDate").value;
  const endInput = document.getElementById("endDate").value;

  const start = new Date(startInput);
  const end = new Date(endInput);

  localStorage.setItem("startDate", startInput);
  localStorage.setItem("endDate", endInput);


  let days = [];
  let temp = new Date(start);


  while (temp <= end) {
    days.push(new Date(temp));
    temp.setDate(temp.getDate() + 1);
  }

  const options = { day: '2-digit', month: 'short', year: 'numeric' };
  document.getElementById("dateRange").innerText =
    start.toLocaleDateString('en-GB', options) + " – " +
    end.toLocaleDateString('en-GB', options);

  let header = "<tr><th>" + routineTitle + "</th>";

  days.forEach(d => {
  if (d.getDate() === 1) {
    header += "<th>" + d.getDate() + " " + d.toLocaleString('default', { month: 'short' }) + "</th>";
  } else {
    header += "<th>" + d.getDate() + "</th>";
  }
});

updateProgress(); // ✅ put here


  header += "</tr>";
  table.innerHTML += header;

  habits.forEach((habit, habitIndex) => {
    
    let text = habit.toLowerCase();
let isJummah = text.includes("jumu");
let isKahf = text.includes("kahf");
let isDhuhrMain = text.includes("dhuhr (") && !text.includes("after");
    let row = "<tr><td>" + habit + "</td>";

    days.forEach((d) => {
      const isFriday = d.getDay() === 5;

let dateKey = d.getFullYear() + "-" +
  String(d.getMonth() + 1).padStart(2, '0') + "-" +
  String(d.getDate()).padStart(2, '0');

let checked = loadCheck(dateKey, habitIndex) ? "checked" : "";

// ❌ disable other days
if (
  (!isFriday && (isJummah || isKahf)) ||   // jummah & kahf only Friday
 (isFriday && isDhuhrMain)                   // ❌ Dhuhr disabled on Friday
) {
  row += `<td class="disabled-day">
    <input type='checkbox' disabled>
  </td>`;
  return;
}

// ✅ Friday highlight
let highlight = (isFriday && (isJummah || isKahf)) ? "friday-special" : "";

row += `<td class="${highlight}">
  <input type='checkbox'
data-date="${dateKey}"
data-habit="${habitIndex}"
${checked}
onchange="saveCheck('${dateKey}', ${habitIndex}, this.checked); updateProgress();">
</td>`;
    });

    row += "</tr>";
    table.innerHTML += row;
  });

}

function applyDates() {
  const startInput = document.getElementById("startDate").value;
  const endInput = document.getElementById("endDate").value;

  if (startInput && endInput) {
    saveSettings(startInput, endInput);
  }

  generateTable();
}


async function loadAllData() {
  let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: {
      "X-Master-Key": API_KEY
    }
  });

  let json = await res.json();

  let newData = JSON.stringify(json.record);

  if (ignoreCloudUpdate) return;

if (newData !== lastCloudData) {
  cloudData = json.record.data || {};
  settings = json.record.settings || {};
}

// update inputs
document.getElementById("startDate").value = settings.startDate || "";
document.getElementById("endDate").value = settings.endDate || "";

// save latest
lastCloudData = newData;

// ❗ DO NOT rebuild table here

  isCloudLoaded = true;
}

  document.getElementById("endDate").value = savedEnd;

if (settings.startDate && settings.endDate) {
  document.getElementById("startDate").value = settings.startDate;
  document.getElementById("endDate").value = settings.endDate;
}
generateTable();      // then build table
 updateProgress();

  // 4. ensure progress is correct

};

function toggleEditor() {
  const panel = document.getElementById("editorPanel");
  const textarea = document.getElementById("habitEditor");

  if (panel.style.display === "none") {
    panel.style.display = "block";
    textarea.value = habits.join("\n");
    document.getElementById("titleEditor").value = routineTitle;
  } else {
    panel.style.display = "none";
  }
}

function saveEditedHabits() {
  const newTitle = document.getElementById("titleEditor").value;
  const text = document.getElementById("habitEditor").value;

  habits = text.split("\n").filter(h => h.trim() !== "");
  routineTitle = newTitle || "Routine (WHEN + WHAT)";
localStorage.setItem("routineTitle", routineTitle);

  localStorage.setItem("habits", JSON.stringify(habits));

  generateTable();

  // ✅ CLOSE editor after save
  document.getElementById("editorPanel").style.display = "none";

}

function saveCheck(dateKey, habitIndex, checked) {
  const key = dateKey + "_" + habitIndex;

  if (checked) {
    cloudData[key] = true;
  } else {
    delete cloudData[key];
  }

 clearTimeout(window.syncTimer);
window.syncTimer = setTimeout(syncToCloud, 800);
}
